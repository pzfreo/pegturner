[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Standard @BBL X1C"
filaments = ["Generic ABS @base", "Generic ABS @base", "Generic ABS @base"]  # AMS slots 1-3

[slicer.overrides]
curr_bed_type = "High Temp Plate"

[printer]
mode = "bambu-connect"

[[parts]]
file = "peg_turner.step"
copies = 1
orient = "upright"
filament = 3
