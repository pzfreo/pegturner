[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Standard @BBL P1S"
[slicer.overrides]
curr_bed_type = "Textured PEI Plate"
sparse_infill_density = "100%"
sparse_infill_pattern = "rectilinear"
brim_type = "outer_only"
brim_width = "5"

[slicer.slots]
1 = "Bambu PLA Basic @BBL P1S"
4 = "Bambu PLA Basic @BBL P1S"

[printer]
mode = "cloud-bridge"
serial = "01P00A451601106"


[[parts]]
file = "peg_turner_wi.3mf"
copies = 1
filament = 4

[parts.filaments]
inlay = 1
