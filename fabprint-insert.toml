[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Standard @BBL X1C"

[slicer.slots]
"Generic TPU @base" = 5  # direct feed (bypass AMS)

[slicer.overrides]
curr_bed_type = "Textured PEI Plate"
sparse_infill_density = "100%"
sparse_infill_pattern = "rectilinear"

[printer]
mode = "cloud-bridge"
serial = "01P00A451601106"


[[parts]]
file = "peg_insert.step"
copies = 1
orient = "upright"
filament = "Generic TPU @base"
