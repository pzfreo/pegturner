name: Build and Slice

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install build123d

      - name: Generate CAD models
        run: python peg_turner.py

      - name: Upload STEP files
        uses: actions/upload-artifact@v4
        with:
          name: step-files
          path: "*.step"

  slice-body:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download STEP files
        uses: actions/download-artifact@v4
        with:
          name: step-files

      - name: Slice body
        uses: pzfreo/fabprint/action@main
        with:
          config: fabprint-wi.toml

  slice-inserts:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download STEP files
        uses: actions/download-artifact@v4
        with:
          name: step-files

      - name: Slice inserts
        uses: pzfreo/fabprint/action@main
        with:
          config: fabprint-inserts.toml
