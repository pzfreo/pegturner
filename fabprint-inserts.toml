name = "peg-turner-inserts"

[pipeline]
stages = ["load", "arrange", "plate", "slice", "print"]

[printer]
name = "workshop"

[plate]
size = [256, 256]
padding = 5.0

[slicer]
engine = "orca"
printer = "Bambu Lab P1S 0.4 nozzle"
process = "0.20mm Standard @BBL X1C"
[slicer.slots]
5 = "Bambu TPU 95A @base"
[slicer.overrides]
curr_bed_type = "Textured PEI Plate"
sparse_infill_density = "100%"
sparse_infill_pattern = "rectilinear"

[[parts]]
file = "peg_insert_2_0.step"
copies = 1
rotate = [180, 0, 0]
filament = 5

[[parts]]
file = "peg_insert_2_5.step"
copies = 1
rotate = [180, 0, 0]
filament = 5
